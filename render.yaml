services:
  - type: web
    name: stylique-api
    runtime: node
    rootDir: stylique-virtual-tryon/backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: OTP_FROM_EMAIL
        sync: false
      - key: OTP_FROM_NAME
        value: Stylique
      - key: ALLOW_DEV_OTP_LOGIN
        value: "false"
      - key: ALLOW_LOG_ONLY_OTP_LOGIN
        value: "true"
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_SCOPES
        value: read_products,write_products,read_themes,write_themes
      - key: SHOPIFY_REDIRECT_URI
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: eu-west-1
